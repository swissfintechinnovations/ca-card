        '500':
          $ref: ./components/responses/standard500.yaml
  /card-contracts/{cardContractId}:
    get:
      summary: Provides a single card contract which matches the id
      description: |
        This operation enables the retrieval of a single card contract when the cardContractId is already known.
      operationId: getCardContract
      tags:
        - Card-contracts
      parameters:
        - $ref: ./components/parameters/path/cardContractId.yaml
        - $ref: ./components/parameters/header/client.yaml
        - $ref: ./components/parameters/header/correlation.yaml
        - $ref: ./components/parameters/header/agent.yaml
      responses:
        '200':
          description: Single card contract was found. If the cardContractId was not found, a 400 is returned.
          headers:
            X-Correlation-ID:
              $ref: ./components/headers/X-Correlation-ID.yaml
          content:
