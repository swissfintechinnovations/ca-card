              schema:
                $ref: ./components/schemas/CardContractDetails.yaml
        '400':
          $ref: ./components/responses/standard400.yaml
        '500':
          $ref: ./components/responses/standard500.yaml
  /card-account-bundles:
    get:
      summary: Provides a list of card account bundles which match the provided query parameters
      description: |
        This operation enables the retrieval of a list of card account bundles as structure element for card accounts.
      operationId: listCardAccountBundles
      tags:
        - Card-account-bundles
      parameters:  # toBeUpdated
        - $ref: ./components/parameters/query/cursor.yaml
        - $ref: ./components/parameters/query/limit.yaml
        - $ref: ./components/parameters/header/client.yaml
        - $ref: ./components/parameters/header/correlation.yaml
        - $ref: ./components/parameters/header/agent.yaml
      responses:
        '200':
          description: |
            Card account bundles were found which match the query parameters. If no card account bundles matched the parameters or
            access rights are missing, an empty list is returned.
          headers:
            X-Correlation-ID:
              $ref: ./components/headers/X-Correlation-ID.yaml
            X-Next-Cursor:
              $ref: ./components/headers/X-Next-Cursor.yaml
          content:
            application/json:
              schema:
                type: object
                required:
                  - card-account-bundles
                properties:
                  card-account-bundles:
                    type: array
                    items:
                      $ref: ./components/schemas/CardAccountBundleDetails.yaml
        '400':
          $ref: ./components/responses/standard400.yaml
        '500':
          $ref: ./components/responses/standard500.yaml
  /card-account-bundles/{cardAccountBundleId}:
    get:
      summary: Provides a single card account bundle which matches the id
      description: |
        This operation enables the retrieval of a single card account bundle when the cardAccountBundleId is already known.
      operationId: getCardAccountBundle
      tags:
        - Card-account-bundles
      parameters:
        - $ref: ./components/parameters/path/cardAccountBundleId.yaml
        - $ref: ./components/parameters/header/client.yaml
        - $ref: ./components/parameters/header/correlation.yaml
        - $ref: ./components/parameters/header/agent.yaml
      responses:
