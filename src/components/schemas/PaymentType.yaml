title: Payment type
description: |
  Method used for settlement of the open balance.
  Value 'direct_debit' is used for lsv, debit_direct and other automatic debiting.
  Value 'ipi' is used for international payments and if account is in non-CHF currency.
  Debit and prepaid cards are settled directly to available balance on the bank/card account. For those, the attribute is not used.
type: string
enum:
  - direct_debit
  - qr
  - ipi
examples:
  - direct_debit
